<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数学大拔河联机版</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div class="app-shell">
    <section class="panel panel-lobby">
      <div class="hero">
        <p class="eyebrow">ONLINE MATCH</p>
        <h1>数学大拔河</h1>
        <p class="subtitle">服务端判题、双人房间、实时同步</p>
      </div>

      <div class="grid-two">
        <div class="card">
          <h2>玩家信息</h2>
          <label class="field">
            <span>你的昵称</span>
            <input id="playerName" maxlength="16" placeholder="例如：一班小张" value="玩家">
          </label>
          <button id="connectBtn" class="btn btn-primary">连接服务器</button>
          <p id="connectionText" class="hint">未连接</p>
        </div>

        <div class="card">
          <h2>房间操作</h2>
          <label class="field">
            <span>房间号</span>
            <input id="roomCodeInput" maxlength="5" placeholder="输入 5 位房间号">
          </label>
          <div class="button-row">
            <button id="createRoomBtn" class="btn btn-accent">创建房间</button>
            <button id="joinRoomBtn" class="btn btn-secondary">加入房间</button>
          </div>
          <p class="hint">部署到服务器后，把房间链接发给另一位玩家，对方打开网站即可进入同一房间。</p>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>比赛配置</h2>
          <span id="hostOnlyTag" class="mini-tag">仅房主可改</span>
        </div>
        <div class="grid-config">
          <label class="field">
            <span>游戏时长</span>
            <select id="durationSelect">
              <option value="30">30 秒</option>
              <option value="45" selected>45 秒</option>
              <option value="60">60 秒</option>
              <option value="90">90 秒</option>
              <option value="120">120 秒</option>
            </select>
          </label>
          <label class="field">
            <span>目标题数</span>
            <input id="targetQuestionsInput" type="number" min="1" max="50" value="10">
          </label>
          <label class="field field-wide">
            <span>题目难度</span>
            <select id="difficultySelect"></select>
          </label>
        </div>
        <div class="button-row">
          <button id="saveConfigBtn" class="btn btn-secondary">同步配置</button>
          <button id="startGameBtn" class="btn btn-primary">开始比赛</button>
          <button id="leaveRoomBtn" class="btn btn-ghost">离开房间</button>
        </div>
      </div>

      <div class="card room-card">
        <h2>当前房间</h2>
        <div class="room-meta">
          <div><span class="meta-label">房间号</span><strong id="roomCodeText">-</strong></div>
          <div><span class="meta-label">我的队伍</span><strong id="teamText">-</strong></div>
          <div><span class="meta-label">阶段</span><strong id="phaseText">未加入</strong></div>
        </div>
        <div class="share-card">
          <span class="meta-label">邀请链接</span>
          <div id="roomLinkText" class="room-link">-</div>
          <div class="button-row compact-row">
            <button id="copyRoomLinkBtn" class="btn btn-secondary" disabled>复制房间链接</button>
          </div>
          <p id="roomTipsText" class="hint">创建房间后可复制邀请链接给另一位玩家。</p>
        </div>
        <div class="team-list">
          <div class="team-box blue-box"><span>蓝队</span><strong id="bluePlayerText">空位</strong></div>
          <div class="team-box red-box"><span>红队</span><strong id="redPlayerText">空位</strong></div>
        </div>
      </div>
    </section>

    <section class="panel panel-game">
      <header class="game-header">
        <div class="score-pill blue-pill">蓝队 <span id="blueScore">0</span></div>
        <div class="center-meta">
          <div id="timerText" class="timer-text">00:45</div>
          <div id="ropeHint" class="rope-hint">等待比赛开始</div>
        </div>
        <div class="score-pill red-pill">红队 <span id="redScore">0</span></div>
      </header>

      <main class="game-layout">
        <aside class="side-card blue-side">
          <div class="side-head">
            <span id="mySideLabelBlue">蓝队</span>
            <strong id="blueProgressText">答 0 / 0</strong>
          </div>
          <div id="myQuestionCardBlue" class="question-card inactive">
            <p class="question-tag">题目</p>
            <div id="questionBlue" class="question-text">等待开始</div>
          </div>
          <div id="resultBlue" class="result-box">等待作答</div>
        </aside>

        <section class="arena-card">
          <div class="arena-frame">
            <div class="mid-line"></div>
            <div id="tugGroup" class="tug-group">
              <img src="/images/1.png" alt="蓝队角色1" class="avatar avatar-blue-1">
              <img src="/images/2.png" alt="蓝队角色2" class="avatar avatar-blue-2">
              <div class="rope"></div>
              <div class="ribbon"></div>
              <img src="/images/3.png" alt="红队角色1" class="avatar avatar-red-1">
              <img src="/images/4.png" alt="红队角色2" class="avatar avatar-red-2">
            </div>
          </div>
          <div class="arena-status">
            <span id="meTeamLabel">未分队</span>
            <span id="opponentStateText">对手等待中</span>
          </div>
        </section>

        <aside class="side-card red-side">
          <div class="side-head">
            <span id="mySideLabelRed">红队</span>
            <strong id="redProgressText">答 0 / 0</strong>
          </div>
          <div id="myQuestionCardRed" class="question-card inactive">
            <p class="question-tag">题目</p>
            <div id="questionRed" class="question-text">等待开始</div>
          </div>
          <div id="resultRed" class="result-box">等待作答</div>
        </aside>
      </main>

      <section class="answer-panel">
        <div class="display-wrap">
          <span>当前输入</span>
          <strong id="answerDisplay">-</strong>
        </div>
        <div id="numpad" class="numpad"></div>
      </section>

      <div id="gameOverlay" class="overlay hidden">
        <div class="overlay-card">
          <p class="eyebrow">MATCH RESULT</p>
          <h2 id="winnerText">比赛结束</h2>
          <p id="summaryText" class="subtitle">等待结果</p>
          <button id="backToLobbyBtn" class="btn btn-primary">返回大厅</button>
        </div>
      </div>
    </section>
  </div>

  <audio id="audioCorrect" src="/sounds/correct.mp3" preload="auto"></audio>
  <audio id="audioWrong" src="/sounds/wrong.mp3" preload="auto"></audio>
  <audio id="audioGameover" src="/sounds/endhappy.mp3" preload="auto"></audio>

  <script src="/public/app.js"></script>
</body>
</html>
